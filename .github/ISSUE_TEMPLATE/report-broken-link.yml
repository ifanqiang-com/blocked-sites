name: Report a broken or unsafe link
description: Report a dead, redirected, compromised, misleading, or unsafe resource.
title: "[Link report]: "
labels: ["data: link-report"]
body:
  - type: input
    id: listed_url
    attributes:
      label: Listed URL
      placeholder: "https://example.com"
    validations:
      required: true
  - type: input
    id: record
    attributes:
      label: Record ID or Markdown page
      placeholder: "bbc-com-zhongwen-simp or sites/items/bbc-com-zhongwen-simp.md"
    validations:
      required: false
  - type: dropdown
    id: issue_type
    attributes:
      label: What happened?
      options:
        - Broken or timeout
        - Redirected to a different site
        - Unsafe or malicious
        - Misleading or spammy
        - Wrong category or description
        - Duplicate
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include HTTP status, redirect target, screenshot description, browser warning, or security-tool result when available.
    validations:
      required: true
  - type: checkboxes
    id: disclosure
    attributes:
      label: Safety
      options:
        - label: I did not include private credentials, tokens, or exploit instructions.
          required: true
