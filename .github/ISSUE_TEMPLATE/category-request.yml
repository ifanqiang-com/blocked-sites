name: Suggest a category improvement
description: Propose a new category, merge, split, rename, or tagging rule.
title: "[Category]: "
labels: ["data: category"]
body:
  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - New category
        - Rename category
        - Split category
        - Merge categories
        - Tagging rule
        - Topic page improvement
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category or topic name
      placeholder: "developer-resources, academic-research, AI tools, etc."
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this useful?
      description: Explain what becomes easier to find or maintain after this change.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example resources
      description: List several records that should belong to the proposed category or rule.
    validations:
      required: false
